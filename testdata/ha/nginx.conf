events {}

http {
  upstream proxyharbor {
    server proxyharbor-a:8080 max_fails=1 fail_timeout=5s;
    server proxyharbor-b:8080 max_fails=1 fail_timeout=5s;
    server proxyharbor-c:8080 max_fails=1 fail_timeout=5s;
  }

  server {
    listen 8080;

    location / {
      proxy_pass http://proxyharbor;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 1s;
      proxy_read_timeout 1s;
      proxy_next_upstream error timeout http_502 http_503 http_504;
      proxy_next_upstream_tries 3;
    }
  }
}

