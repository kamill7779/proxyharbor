events {}

http {
  upstream proxyharbor {
    server proxyharbor-a:8080;
    server proxyharbor-b:8080;
    server proxyharbor-c:8080;
  }

  server {
    listen 8080;

    location / {
      proxy_pass http://proxyharbor;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}

