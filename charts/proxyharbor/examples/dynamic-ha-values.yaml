# Dynamic-keys multi-replica HA example for ProxyHarbor v0.1.6+
#
# Use this as a starting point for production-style multi-instance deployments
# with MySQL persistence and Redis-accelerated cache invalidation.
#
# Usage:
#   helm template ph charts/proxyharbor -f charts/proxyharbor/examples/dynamic-ha-values.yaml
#   helm install ph charts/proxyharbor -f charts/proxyharbor/examples/dynamic-ha-values.yaml
#
# Required preconditions:
#   1. Apply MySQL migrations 001..004 before deploying (see docs/operations/rolling-update.md).
#   2. Create a Kubernetes Secret with admin-key, pepper, mysql-dsn (and optionally redis-password):
#        kubectl create secret generic proxyharbor-credentials \
#          --from-literal=admin-key="$(openssl rand -hex 32)" \
#          --from-literal=pepper="$(openssl rand -hex 32)" \
#          --from-literal=mysql-dsn='ph:CHANGEME@tcp(mysql.svc:3306)/proxyharbor?parseTime=true&loc=UTC'
#      Reference it via the existingSecret fields below; never commit plaintext keys.
#
# Notes:
#   - Redis pub/sub here only accelerates cache invalidation. Polling
#     (auth.refreshInterval) remains the authoritative convergence path,
#     so a Redis outage cannot break authentication.
#   - PROXYHARBOR_INSTANCE_ID is auto-injected from metadata.name by the
#     deployment template; no extra config required.

replicaCount: 3

role: all

# Safer rolling update for multi-replica deployments: never let the active
# pool drop below replicaCount. Combined with the v0.1.6 /readyz auth gate
# this keeps traffic away from instances whose dynamic auth cache is not
# yet loaded.
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

auth:
  mode: dynamic-keys
  existingSecret: proxyharbor-credentials   # Secret with admin-key, pepper, mysql-dsn.
  existingSecretKey: ""                     # Unused for dynamic-keys; the chart
                                            # reads admin-key + pepper directly.
  refreshInterval: 5s
  invalidation: auto                        # auto | redis | polling.

mysql:
  existingSecret: proxyharbor-credentials
  existingSecretKey: mysql-dsn
  maxOpen: 30
  maxIdle: 10
  connMaxAge: 30m

redis:
  addr: "redis.svc:6379"
  selectorRedisRequired: true
  # Set redis.existingSecret + existingSecretKey if AUTH-protected.
  # existingSecret: proxyharbor-credentials
  # existingSecretKey: redis-password
  db: 0

cache:
  ttl: 60s

shutdownTimeout: 20s

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

probes:
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 20

podAnnotations:
  prometheus.io/scrape: "false"
