# Dynamic-key HA example for ProxyHarbor v0.4.0.
#
# Required preconditions:
#   1. Initialize MySQL with migrations/mysql/init.sql.
#   2. Create a Secret with admin-key, pepper, mysql-dsn, and optional redis-password:
#        kubectl create secret generic proxyharbor-credentials \
#          --from-literal=admin-key="$(openssl rand -hex 32)" \
#          --from-literal=pepper="$(openssl rand -hex 32)" \
#          --from-literal=mysql-dsn='ph:REPLACE_ME@tcp(mysql.svc:3306)/proxyharbor?parseTime=true&loc=UTC'

storage: mysql
replicaCount: 3
role: all

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

auth:
  existingSecret: proxyharbor-credentials
  keys:
    adminKey: admin-key
    pepper: pepper
  refreshInterval: 5s
  invalidation: auto

mysql:
  existingSecret: proxyharbor-credentials
  existingSecretKey: mysql-dsn
  maxOpen: 30
  maxIdle: 10
  connMaxAge: 30m

redis:
  addr: redis.svc:6379
  selectorRedisRequired: true
  db: 0
  # existingSecret: proxyharbor-credentials
  # existingSecretKey: redis-password

cache:
  ttl: 60s

shutdownTimeout: 20s

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

probes:
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 20

# /metrics is protected by ProxyHarbor-Key. Configure a Prometheus scrape job or
# ServiceMonitor that sends the admin key; do not enable unauthenticated scrape
# annotations by default.
podAnnotations: {}

cluster:
  enabled: true
  heartbeatInterval: 10s
  leaderLeaseTTL: 45s
  maintenanceInterval: 30s
  maintenanceBatchSize: 500

scoring:
  profile: default

zfair:
  quantum: 1000
  defaultLatencyMS: 200
  maxPromote: 128
