{{/*
Only generate a Secret when the user did not provide existing Secrets.
*/}}
{{- $tenantKeys := "" -}}
{{- if .Values.auth.tenantKeysString -}}
{{- $tenantKeys = .Values.auth.tenantKeysString -}}
{{- else if .Values.auth.tenantKeys -}}
{{- $parts := list -}}
{{- range $tenant, $key := .Values.auth.tenantKeys -}}
{{- $parts = append $parts (printf "%s:%s" $tenant $key) -}}
{{- end -}}
{{- $tenantKeys = join "," $parts -}}
{{- end -}}
{{- $hasTenantKeys := or .Values.auth.tenantKeysExistingSecret $tenantKeys -}}
{{- $hasLegacy := or (default .Values.auth.existingSecret .Values.auth.legacyExistingSecret) (default .Values.auth.key .Values.auth.legacySingleKey) -}}
{{- if and $hasTenantKeys $hasLegacy -}}
{{- fail "set either auth.tenantKeys/auth.tenantKeysString/auth.tenantKeysExistingSecret or auth.legacySingleKey/auth.legacyExistingSecret, not both" -}}
{{- end -}}
{{- if not (or $hasTenantKeys $hasLegacy) -}}
{{- fail "auth tenant keys are required: set auth.tenantKeys, auth.tenantKeysString, auth.tenantKeysExistingSecret, or legacy auth for old deployments" -}}
{{- end -}}
{{- $needTenantKeys := and (not .Values.auth.tenantKeysExistingSecret) $tenantKeys -}}
{{- $needLegacy := and (not (default .Values.auth.existingSecret .Values.auth.legacyExistingSecret)) (default .Values.auth.key .Values.auth.legacySingleKey) -}}
{{- $needMysql := and (not .Values.mysql.existingSecret) (.Values.mysql.dsn) -}}
{{- $needRedis := and (not .Values.redis.existingSecret) (.Values.redis.password) -}}
{{- if or $needTenantKeys $needLegacy $needMysql $needRedis -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "proxyharbor.fullname" . }}-secret
  labels:
    {{- include "proxyharbor.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if $needTenantKeys }}
  tenant-keys: {{ $tenantKeys | b64enc | quote }}
  {{- end }}
  {{- if $needLegacy }}
  auth-key: {{ (default .Values.auth.key .Values.auth.legacySingleKey) | b64enc | quote }}
  {{- end }}
  {{- if $needMysql }}
  mysql-dsn: {{ .Values.mysql.dsn | b64enc | quote }}
  {{- end }}
  {{- if $needRedis }}
  redis-password: {{ .Values.redis.password | b64enc | quote }}
  {{- end }}
{{- end }}
{{- if and (not .Values.mysql.existingSecret) (not .Values.mysql.dsn) }}
{{- fail "mysql.dsn or mysql.existingSecret is required" }}
{{- end }}
