{{/*
Create a chart-owned Secret only when values provide plaintext secrets and no existingSecret is configured.
Prefer auth.existingSecret/mysql.existingSecret/redis.existingSecret for production so secrets do not appear in values.
*/}}
{{- $needAuth := and (not .Values.auth.existingSecret) (.Values.auth.key) -}}
{{- $needTenantKeys := and (not .Values.auth.existingSecret) (.Values.auth.tenantKeys) -}}
{{- $needAdminKey := and (not .Values.auth.existingSecret) (.Values.auth.adminKey) -}}
{{- $needPepper := and (not .Values.auth.existingSecret) (.Values.auth.pepper) -}}
{{- $needMysql := and (not .Values.mysql.existingSecret) (.Values.mysql.dsn) -}}
{{- $needRedis := and (not .Values.redis.existingSecret) (.Values.redis.password) -}}
{{- if or $needAuth $needTenantKeys $needAdminKey $needPepper $needMysql $needRedis -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "proxyharbor.fullname" . }}-secret
  labels:
    {{- include "proxyharbor.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if $needAuth }}
  auth-key: {{ .Values.auth.key | b64enc | quote }}
  {{- end }}
  {{- if $needTenantKeys }}
  tenant-keys: {{ .Values.auth.tenantKeys | b64enc | quote }}
  {{- end }}
  {{- if $needAdminKey }}
  admin-key: {{ .Values.auth.adminKey | b64enc | quote }}
  {{- end }}
  {{- if $needPepper }}
  pepper: {{ .Values.auth.pepper | b64enc | quote }}
  {{- end }}
  {{- if $needMysql }}
  mysql-dsn: {{ .Values.mysql.dsn | b64enc | quote }}
  {{- end }}
  {{- if $needRedis }}
  redis-password: {{ .Values.redis.password | b64enc | quote }}
  {{- end }}
{{- end }}
{{- if and (not .Values.auth.existingSecret) (not .Values.auth.key) (not .Values.auth.tenantKeys) (not .Values.auth.adminKey) }}
{{- fail "auth.key (legacy), auth.tenantKeys (tenant-keys), auth.adminKey (dynamic-keys), or auth.existingSecret is required" }}
{{- end }}
{{- if and (not .Values.mysql.existingSecret) (not .Values.mysql.dsn) }}
{{- fail "mysql.dsn or mysql.existingSecret is required" }}
{{- end }}
