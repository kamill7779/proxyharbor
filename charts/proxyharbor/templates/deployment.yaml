{{- $resources := ternary .Values.resourcesLightweight .Values.resources .Values.lightweight -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "proxyharbor.fullname" . }}
  labels:
    {{- include "proxyharbor.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "proxyharbor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "proxyharbor.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: proxyharbor
          image: {{ include "proxyharbor.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PROXYHARBOR_ROLE
              value: {{ .Values.role | quote }}
            - name: PROXYHARBOR_ADDR
              value: ":8080"
            - name: PROXYHARBOR_STORAGE
              value: "mysql"
            - name: PROXYHARBOR_MYSQL_MAX_OPEN
              value: {{ .Values.mysql.maxOpen | quote }}
            - name: PROXYHARBOR_MYSQL_MAX_IDLE
              value: {{ .Values.mysql.maxIdle | quote }}
            - name: PROXYHARBOR_MYSQL_CONN_MAX_AGE
              value: {{ .Values.mysql.connMaxAge | quote }}
            - name: PROXYHARBOR_REDIS_ADDR
              value: {{ .Values.redis.addr | quote }}
            - name: PROXYHARBOR_REDIS_DB
              value: {{ .Values.redis.db | quote }}
            - name: PROXYHARBOR_CACHE_TTL
              value: {{ .Values.cache.ttl | quote }}
            - name: PROXYHARBOR_SHUTDOWN_TIMEOUT
              value: {{ .Values.shutdownTimeout | quote }}
            # ----- Auth: tenant keys by default, legacy single key only for old deployments -----
            {{- $tenantKeys := "" }}
            {{- if .Values.auth.tenantKeysString }}
            {{- $tenantKeys = .Values.auth.tenantKeysString }}
            {{- else if .Values.auth.tenantKeys }}
            {{- $parts := list }}
            {{- range $tenant, $key := .Values.auth.tenantKeys }}
            {{- $parts = append $parts (printf "%s:%s" $tenant $key) }}
            {{- end }}
            {{- $tenantKeys = join "," $parts }}
            {{- end }}
            {{- if or .Values.auth.tenantKeysExistingSecret $tenantKeys }}
            - name: PROXYHARBOR_TENANT_KEYS
              valueFrom:
                secretKeyRef:
                  {{ if .Values.auth.tenantKeysExistingSecret }}
                  name: {{ .Values.auth.tenantKeysExistingSecret }}
                  key: {{ .Values.auth.tenantKeysExistingSecretKey }}
                  {{ else }}
                  name: {{ include "proxyharbor.fullname" . }}-secret
                  key: tenant-keys
                  {{ end }}
            {{- else }}
            - name: PROXYHARBOR_AUTH_KEY
              valueFrom:
                secretKeyRef:
                  {{ if (default .Values.auth.existingSecret .Values.auth.legacyExistingSecret) }}
                  name: {{ (default .Values.auth.existingSecret .Values.auth.legacyExistingSecret) }}
                  key: {{ (default .Values.auth.existingSecretKey .Values.auth.legacyExistingSecretKey) }}
                  {{ else }}
                  name: {{ include "proxyharbor.fullname" . }}-secret
                  key: auth-key
                  {{ end }}
            {{- end }}
            - name: PROXYHARBOR_MYSQL_DSN
              {{- if .Values.mysql.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mysql.existingSecret }}
                  key: {{ .Values.mysql.existingSecretKey }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "proxyharbor.fullname" . }}-secret
                  key: mysql-dsn
              {{- end }}
            {{- if or .Values.redis.existingSecret .Values.redis.password }}
            - name: PROXYHARBOR_REDIS_PASSWORD
              {{- if .Values.redis.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.existingSecret }}
                  key: {{ .Values.redis.existingSecretKey }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "proxyharbor.fullname" . }}-secret
                  key: redis-password
              {{- end }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          resources:
            {{- toYaml $resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
