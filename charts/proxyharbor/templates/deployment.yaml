{{- $resources := ternary .Values.resourcesLightweight .Values.resources .Values.lightweight -}}
{{- if and (eq .Values.storage "sqlite") (ne (int .Values.replicaCount) 1) -}}
{{- fail "storage=sqlite requires replicaCount=1; use storage=mysql for HA" -}}
{{- end -}}
{{- if and (eq .Values.storage "sqlite") .Values.autoscaling.enabled -}}
{{- fail "storage=sqlite does not support autoscaling; use storage=mysql for HA" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "proxyharbor.fullname" . }}
  labels:
    {{- include "proxyharbor.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- with .Values.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "proxyharbor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "proxyharbor.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: proxyharbor
          image: {{ include "proxyharbor.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PROXYHARBOR_ROLE
              value: {{ .Values.role | quote }}
            - name: PROXYHARBOR_ADDR
              value: ":8080"
            - name: PROXYHARBOR_STORAGE
              value: {{ .Values.storage | quote }}
            - name: PROXYHARBOR_SQLITE_PATH
              value: {{ .Values.sqlite.path | quote }}
            - name: PROXYHARBOR_MYSQL_MAX_OPEN
              value: {{ .Values.mysql.maxOpen | quote }}
            - name: PROXYHARBOR_MYSQL_MAX_IDLE
              value: {{ .Values.mysql.maxIdle | quote }}
            - name: PROXYHARBOR_MYSQL_CONN_MAX_AGE
              value: {{ .Values.mysql.connMaxAge | quote }}
            {{- if .Values.redis.addr }}
            - name: PROXYHARBOR_REDIS_ADDR
              value: {{ .Values.redis.addr | quote }}
            {{- end }}
            - name: PROXYHARBOR_SELECTOR_REDIS_REQUIRED
              value: {{ .Values.redis.selectorRedisRequired | quote }}
            {{- if .Values.redis.addr }}
            - name: PROXYHARBOR_REDIS_DB
              value: {{ .Values.redis.db | quote }}
            {{- end }}
            - name: PROXYHARBOR_CACHE_TTL
              value: {{ .Values.cache.ttl | quote }}
            - name: PROXYHARBOR_SHUTDOWN_TIMEOUT
              value: {{ .Values.shutdownTimeout | quote }}
            - name: PROXYHARBOR_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret }}
                  key: {{ .Values.auth.keys.adminKey }}
            - name: PROXYHARBOR_KEY_PEPPER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret }}
                  key: {{ .Values.auth.keys.pepper }}
            - name: PROXYHARBOR_AUTH_REFRESH_INTERVAL
              value: {{ .Values.auth.refreshInterval | quote }}
            {{- if .Values.auth.invalidation }}
            - name: PROXYHARBOR_AUTH_INVALIDATION
              value: {{ .Values.auth.invalidation | quote }}
            {{- end }}
            {{- if .Values.cluster.enabled }}
            - name: PROXYHARBOR_CLUSTER_ENABLED
              value: "true"
            - name: PROXYHARBOR_INSTANCE_HEARTBEAT_INTERVAL
              value: {{ .Values.cluster.heartbeatInterval | quote }}
            - name: PROXYHARBOR_LEADER_LEASE_TTL
              value: {{ .Values.cluster.leaderLeaseTTL | quote }}
            - name: PROXYHARBOR_MAINTENANCE_INTERVAL
              value: {{ .Values.cluster.maintenanceInterval | quote }}
            - name: PROXYHARBOR_MAINTENANCE_BATCH_SIZE
              value: {{ .Values.cluster.maintenanceBatchSize | quote }}
            {{- end }}
            - name: PROXYHARBOR_SCORING_PROFILE
              value: {{ .Values.scoring.profile | quote }}
            - name: PROXYHARBOR_ZFAIR_QUANTUM
              value: {{ .Values.zfair.quantum | quote }}
            - name: PROXYHARBOR_ZFAIR_DEFAULT_LATENCY_MS
              value: {{ .Values.zfair.defaultLatencyMS | quote }}
            - name: PROXYHARBOR_ZFAIR_MAX_PROMOTE
              value: {{ .Values.zfair.maxPromote | quote }}
            - name: PROXYHARBOR_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- if eq .Values.storage "mysql" }}
            - name: PROXYHARBOR_MYSQL_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mysql.existingSecret }}
                  key: {{ .Values.mysql.existingSecretKey }}
            {{- end }}
            {{- if .Values.redis.existingSecret }}
            - name: PROXYHARBOR_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.existingSecret }}
                  key: {{ .Values.redis.existingSecretKey }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          {{- if .Values.preStop.enabled }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep {{ .Values.preStop.sleepSeconds }}"]
          {{- end }}
          resources:
            {{- toYaml $resources | nindent 12 }}
          {{- if and (eq .Values.storage "sqlite") .Values.sqlite.persistence.enabled }}
          volumeMounts:
            - name: proxyharbor-data
              mountPath: {{ dir .Values.sqlite.path }}
          {{- end }}
      {{- if and (eq .Values.storage "sqlite") .Values.sqlite.persistence.enabled }}
      volumes:
        - name: proxyharbor-data
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-data" (include "proxyharbor.fullname" .)) .Values.sqlite.persistence.existingClaim }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

