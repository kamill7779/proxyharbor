apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-proxyharbor
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: proxyharbor
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 8080
