# ProxyHarbor Helm values
# 适配 K8s ≥1.23 与 K3s。所有外部依赖（MySQL/Redis）均由用户提供，chart 不内置数据库子 chart。
#
# 最小可用配置（接入已有 MySQL+Redis）：
#   helm install ph ./charts/proxyharbor \
#     --set auth.key=$(openssl rand -hex 32) \
#     --set mysql.dsn='user:pass@tcp(mysql.svc:3306)/proxyharbor?parseTime=true&loc=UTC' \
#     --set redis.addr=redis.svc:6379
#
# 推荐做法：把 auth.key 与 mysql.dsn 通过 existingSecret 注入，避免明文 values。

image:
  repository: ghcr.io/kamill7779/proxyharbor
  tag: ""              # 默认使用 .Chart.AppVersion
  pullPolicy: IfNotPresent
  pullSecrets: []

# all（开发） | controller（控制面） | gateway（数据面）
role: all
replicaCount: 2

# K3s/边缘环境优化：开启后将 resources/livenessProbe 调到更宽松
lightweight: false

service:
  type: ClusterIP      # K3s 上想直接对外可改 LoadBalancer 由 servicelb 接管
  port: 8080
  annotations: {}

ingress:
  enabled: false
  className: ""        # K3s 默认 traefik；标准 K8s 一般是 nginx
  annotations: {}
  hosts:
    - host: proxyharbor.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# 认证模式（v0.1.5+）
#   legacy       : 单 Key 开发模式（PROXYHARBOR_AUTH_KEY）
#   tenant-keys  : 多租户静态配置（PROXYHARBOR_TENANT_KEYS）
#   dynamic-keys : 生产多租户 DB 驱动（推荐）
auth:
  mode: dynamic-keys
  key: ""                     # legacy 模式专用（向后兼容）
  existingSecret: ""          # 指向已有 Secret（含 auth-key / admin-key / pepper 等键）
  existingSecretKey: "auth-key"
  adminKey: ""                # Bootstrap Admin Key（dynamic-keys 必填，≥32 字符）
  pepper: ""                  # Key Pepper（dynamic-keys 必填，≥32 字节随机）
  refreshInterval: 5s         # 缓存轮询间隔

# MySQL 连接：二选一
#   1) mysql.dsn 直接给完整 DSN（明文）
#   2) mysql.existingSecret 指向 Secret，键名为 mysql.existingSecretKey
mysql:
  dsn: ""
  existingSecret: ""
  existingSecretKey: "mysql-dsn"
  maxOpen: 20
  maxIdle: 5
  connMaxAge: 30m

# Redis 连接：addr 为空时缓存自动降级为 noop（轻量场景可用）
#   密码可走 redis.password 明文，或 existingSecret
redis:
  addr: ""
  password: ""
  existingSecret: ""
  existingSecretKey: "redis-password"
  db: 0

cache:
  ttl: 60s

shutdownTimeout: 15s

# 默认按云原生标准配置；lightweight=true 时自动按 K3s/边缘场景压低
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

resourcesLightweight:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 96Mi

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

probes:
  liveness:
    initialDelaySeconds: 5
    periodSeconds: 15
  readiness:
    initialDelaySeconds: 3
    periodSeconds: 10
