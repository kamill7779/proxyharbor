image:
  repository: ghcr.io/kamill7779/proxyharbor
  tag: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

# Default profile is a lightweight single-instance deployment.
# Use examples/dynamic-ha-values.yaml for MySQL+Redis HA.
role: all
replicaCount: 1
storage: sqlite
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1
lightweight: true
terminationGracePeriodSeconds: 30
preStop:
  enabled: true
  sleepSeconds: 5

service:
  type: ClusterIP
  port: 8080
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: proxyharbor.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

auth:
  # Keep secrets outside values files in production.
  existingSecret: proxyharbor-credentials
  keys:
    adminKey: admin-key
    pepper: pepper
  refreshInterval: 5s
  invalidation: ""

sqlite:
  path: /var/lib/proxyharbor/proxyharbor.db
  persistence:
    enabled: true
    existingClaim: ""
    size: 1Gi
    storageClass: ""

mysql:
  # Required only when storage=mysql.
  existingSecret: ""
  existingSecretKey: mysql-dsn
  maxOpen: 20
  maxIdle: 5
  connMaxAge: 30m

redis:
  addr: ""
  selectorRedisRequired: false
  existingSecret: ""
  existingSecretKey: redis-password
  db: 0

cache:
  ttl: 60s

shutdownTimeout: 15s

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

resourcesLightweight:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 96Mi

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

probes:
  liveness:
    initialDelaySeconds: 5
    periodSeconds: 15
  readiness:
    initialDelaySeconds: 3
    periodSeconds: 10

podDisruptionBudget:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 1

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  # targetMemoryUtilizationPercentage: 80

cluster:
  enabled: false
  heartbeatInterval: 10s
  leaderLeaseTTL: 45s
  maintenanceInterval: 30s
  maintenanceBatchSize: 500

scoring:
  profile: default

zfair:
  quantum: 1000
  defaultLatencyMS: 200
  maxPromote: 128
