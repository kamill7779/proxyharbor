image:
  repository: ghcr.io/kamill7779/proxyharbor
  tag: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

role: all
replicaCount: 1
strategy: {}
lightweight: false

service:
  type: ClusterIP
  port: 8080
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: proxyharbor.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

auth:
  existingSecret: proxyharbor-credentials
  keys:
    adminKey: admin-key
    pepper: pepper
  refreshInterval: 5s
  invalidation: ""

mysql:
  existingSecret: proxyharbor-credentials
  existingSecretKey: mysql-dsn
  maxOpen: 20
  maxIdle: 5
  connMaxAge: 30m

redis:
  addr: ""
  selectorRedisRequired: false
  existingSecret: ""
  existingSecretKey: redis-password
  db: 0

cache:
  ttl: 60s

shutdownTimeout: 15s

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

resourcesLightweight:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 96Mi

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

probes:
  liveness:
    initialDelaySeconds: 5
    periodSeconds: 15
  readiness:
    initialDelaySeconds: 3
    periodSeconds: 10