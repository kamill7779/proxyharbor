# ProxyHarbor docker-compose
#
# Recommended local startup:
#   docker compose --profile bundle up -d --build
#
# Modes:
#   bundle  Start MySQL + Redis + ProxyHarbor together.
#   app     Start only ProxyHarbor and connect to external MySQL / Redis from .env.

services:
  mysql:
    image: mysql:8.4
    profiles: ["bundle"]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: proxyharbor
      MYSQL_USER: proxyharbor
      MYSQL_PASSWORD: proxyharbor
    ports:
      - "3306:3306"
    volumes:
      - ./migrations/mysql/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7.4-alpine
    profiles: ["bundle"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  proxyharbor:
    build:
      context: .
    image: proxyharbor:local
    profiles: ["bundle", "app"]
    environment:
      PROXYHARBOR_ROLE: ${PROXYHARBOR_ROLE:-all}
      PROXYHARBOR_ADDR: ":8080"
      PROXYHARBOR_GATEWAY_URL: ${PROXYHARBOR_GATEWAY_URL:-http://localhost:8080}
      PROXYHARBOR_TENANT_KEYS: ${PROXYHARBOR_TENANT_KEYS:-default:changeme1234567890abcdef}
      PROXYHARBOR_STORAGE: ${PROXYHARBOR_STORAGE:-mysql}
      PROXYHARBOR_MYSQL_DSN: ${PROXYHARBOR_MYSQL_DSN:-proxyharbor:proxyharbor@tcp(mysql:3306)/proxyharbor?parseTime=true&loc=UTC}
      PROXYHARBOR_REDIS_ADDR: ${PROXYHARBOR_REDIS_ADDR:-redis:6379}
      PROXYHARBOR_REDIS_PASSWORD: ${PROXYHARBOR_REDIS_PASSWORD:-}
      PROXYHARBOR_REDIS_DB: ${PROXYHARBOR_REDIS_DB:-0}
      PROXYHARBOR_CACHE_TTL: ${PROXYHARBOR_CACHE_TTL:-60s}
      PROXYHARBOR_SELECTOR: ${PROXYHARBOR_SELECTOR:-zfair}
      PROXYHARBOR_SELECTOR_REDIS_REQUIRED: ${PROXYHARBOR_SELECTOR_REDIS_REQUIRED:-true}
      PROXYHARBOR_SCORING_PROFILE: ${PROXYHARBOR_SCORING_PROFILE:-default}
      PROXYHARBOR_HEALTH_FLUSH_INTERVAL: ${PROXYHARBOR_HEALTH_FLUSH_INTERVAL:-5s}
      PROXYHARBOR_HEALTH_BUFFER_MAX: ${PROXYHARBOR_HEALTH_BUFFER_MAX:-10000}
      PROXYHARBOR_ZFAIR_QUANTUM: ${PROXYHARBOR_ZFAIR_QUANTUM:-1000}
      PROXYHARBOR_ZFAIR_DEFAULT_LATENCY_MS: ${PROXYHARBOR_ZFAIR_DEFAULT_LATENCY_MS:-200}
      PROXYHARBOR_ZFAIR_MAX_PROMOTE: ${PROXYHARBOR_ZFAIR_MAX_PROMOTE:-128}
      PROXYHARBOR_STICKY_ENABLED: ${PROXYHARBOR_STICKY_ENABLED:-false}
      PROXYHARBOR_STICKY_POLICY: ${PROXYHARBOR_STICKY_POLICY:-none}
    ports:
      - "${PROXYHARBOR_HOST_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
