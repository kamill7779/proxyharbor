# ProxyHarbor docker-compose
# Single-instance profile for local evaluation with SQLite persistence.
# Use docker-compose.ha.yaml for MySQL+Redis HA.

services:
  proxyharbor:
    build:
      context: .
    image: proxyharbor:local
    environment:
      PROXYHARBOR_ROLE: ${PROXYHARBOR_ROLE:-all}
      PROXYHARBOR_ADDR: ":8080"
      PROXYHARBOR_GATEWAY_URL: ${PROXYHARBOR_GATEWAY_URL:-http://localhost:${PROXYHARBOR_HOST_PORT:-18080}}
      PROXYHARBOR_STORAGE: ${PROXYHARBOR_STORAGE:-sqlite}
      PROXYHARBOR_SQLITE_PATH: ${PROXYHARBOR_SQLITE_PATH:-/var/lib/proxyharbor/proxyharbor.db}
      PROXYHARBOR_SECRETS_FILE: ${PROXYHARBOR_SECRETS_FILE:-/var/lib/proxyharbor/secrets.env}
      PROXYHARBOR_AUTO_SECRETS: ${PROXYHARBOR_AUTO_SECRETS:-true}
      PROXYHARBOR_SELECTOR_REDIS_REQUIRED: ${PROXYHARBOR_SELECTOR_REDIS_REQUIRED:-false}
      PROXYHARBOR_ALLOW_INTERNAL_PROXY_ENDPOINT: ${PROXYHARBOR_ALLOW_INTERNAL_PROXY_ENDPOINT:-false}
      PROXYHARBOR_ADMIN_KEY: ${PROXYHARBOR_ADMIN_KEY:-}
      PROXYHARBOR_KEY_PEPPER: ${PROXYHARBOR_KEY_PEPPER:-}
      PROXYHARBOR_CACHE_TTL: ${PROXYHARBOR_CACHE_TTL:-60s}
    ports:
      - "${PROXYHARBOR_BIND_ADDR:-127.0.0.1}:${PROXYHARBOR_HOST_PORT:-18080}:8080"
    volumes:
      - proxyharbor-data:/var/lib/proxyharbor
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/readyz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    stop_grace_period: 25s
    restart: unless-stopped

volumes:
  proxyharbor-data:
