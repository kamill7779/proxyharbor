# ProxyHarbor docker-compose
#
# 使用方式（按场景选 profile）：
#
#   场景 A：本地全家桶（mysql + redis + app 一键起）
#     docker compose --profile bundle up -d
#
#   场景 B：你已有外部 MySQL / Redis，仅起 app
#     先把连接信息写到 .env 文件（参考 .env.example），然后：
#     docker compose --profile app up -d
#
#   场景 C：极致轻量 dev（不依赖任何外部组件，使用内存存储 + noop 缓存）
#     docker compose --profile dev up -d
#
# 注意：内存存储仅供单进程开发使用，多副本下数据不一致。

services:
  # ----- 仅在 bundle profile 下启动，自带依赖 -----
  mysql:
    image: mysql:8.4
    profiles: ["bundle"]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: proxyharbor
      MYSQL_USER: proxyharbor
      MYSQL_PASSWORD: proxyharbor
    ports:
      - "3306:3306"
    volumes:
      - ./migrations/mysql/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7.4-alpine
    profiles: ["bundle"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ----- 应用本体：bundle 与 app 共用 -----
  proxyharbor:
    build:
      context: .
    image: proxyharbor:local
    profiles: ["bundle", "app"]
    environment:
      PROXYHARBOR_ROLE: ${PROXYHARBOR_ROLE:-all}
      PROXYHARBOR_ADDR: ":8080"
      PROXYHARBOR_GATEWAY_URL: ${PROXYHARBOR_GATEWAY_URL:-http://localhost:8080}
      PROXYHARBOR_AUTH_KEY: ${PROXYHARBOR_AUTH_KEY:?需要设置 PROXYHARBOR_AUTH_KEY}
      PROXYHARBOR_STORAGE: ${PROXYHARBOR_STORAGE:-mysql}
      PROXYHARBOR_MYSQL_DSN: ${PROXYHARBOR_MYSQL_DSN:-proxyharbor:proxyharbor@tcp(mysql:3306)/proxyharbor?parseTime=true&loc=UTC}
      PROXYHARBOR_REDIS_ADDR: ${PROXYHARBOR_REDIS_ADDR:-redis:6379}
      PROXYHARBOR_REDIS_PASSWORD: ${PROXYHARBOR_REDIS_PASSWORD:-}
      PROXYHARBOR_REDIS_DB: ${PROXYHARBOR_REDIS_DB:-0}
      PROXYHARBOR_CACHE_TTL: ${PROXYHARBOR_CACHE_TTL:-60s}
    ports:
      - "${PROXYHARBOR_HOST_PORT:-8080}:8080"
    restart: unless-stopped

  # ----- 极致轻量 dev：内存存储 + noop 缓存 -----
  proxyharbor-dev:
    build:
      context: .
    image: proxyharbor:local
    profiles: ["dev"]
    environment:
      PROXYHARBOR_ROLE: all
      PROXYHARBOR_ADDR: ":8080"
      PROXYHARBOR_AUTH_KEY: ${PROXYHARBOR_AUTH_KEY:-dev-key}
      PROXYHARBOR_STORAGE: memory
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
