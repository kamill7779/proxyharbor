# ProxyHarbor docker-compose
# Single-instance profile for local evaluation. SQLite store support is reserved
# for v0.4.2 integration; until it lands, use docker-compose.ha.yaml.

services:
  proxyharbor:
    build:
      context: .
    image: proxyharbor:local
    environment:
      PROXYHARBOR_ROLE: ${PROXYHARBOR_ROLE:-all}
      PROXYHARBOR_ADDR: ":8080"
      PROXYHARBOR_GATEWAY_URL: ${PROXYHARBOR_GATEWAY_URL:-http://localhost:8080}
      PROXYHARBOR_STORAGE: ${PROXYHARBOR_STORAGE:-sqlite}
      PROXYHARBOR_SQLITE_PATH: ${PROXYHARBOR_SQLITE_PATH:-/var/lib/proxyharbor/proxyharbor.db}
      PROXYHARBOR_SELECTOR_REDIS_REQUIRED: ${PROXYHARBOR_SELECTOR_REDIS_REQUIRED:-false}
      PROXYHARBOR_ADMIN_KEY: ${PROXYHARBOR_ADMIN_KEY:?set PROXYHARBOR_ADMIN_KEY}
      PROXYHARBOR_KEY_PEPPER: ${PROXYHARBOR_KEY_PEPPER:?set PROXYHARBOR_KEY_PEPPER}
      PROXYHARBOR_CACHE_TTL: ${PROXYHARBOR_CACHE_TTL:-60s}
    ports:
      - "${PROXYHARBOR_HOST_PORT:-8080}:8080"
    volumes:
      - proxyharbor-data:/var/lib/proxyharbor
    restart: unless-stopped

volumes:
  proxyharbor-data:
