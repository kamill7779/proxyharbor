name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race -count=1 ./...

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.15.0
      - name: Helm lint
        run: helm lint charts/proxyharbor
      - name: Helm template (smoke render)
        run: |
          helm template ph charts/proxyharbor \
            --set auth.key=ci-test-key \
            --set mysql.dsn='u:p@tcp(mysql:3306)/db?parseTime=true' \
            --set redis.addr=redis:6379 \
            > /tmp/render.yaml
          test -s /tmp/render.yaml

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: proxyharbor:ci

  docker-ha-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build HA runtime image
        run: docker build --pull=false -t proxyharbor:ha-test .
      - name: Runtime HA correctness
        env:
          PROXYHARBOR_ADMIN_KEY: admin-key-with-at-least-thirty-two-bytes-runtime53
          PROXYHARBOR_KEY_PEPPER: pepper-with-at-least-thirty-two-bytes-runtime53
        run: go run ./tools/haruntimecheck -docker -docker-skip-build -timeout 8m
      - name: HA cache invalidation correctness
        env:
          PROXYHARBOR_ADMIN_KEY: admin-key-with-at-least-thirty-two-bytes-runtime53
          PROXYHARBOR_KEY_PEPPER: pepper-with-at-least-thirty-two-bytes-runtime53
        run: go run ./tools/hacachecheck -docker -docker-skip-build -timeout 6m
      - name: HA write correctness
        env:
          PROXYHARBOR_ADMIN_KEY: admin-key-with-at-least-thirty-two-bytes-runtime53
          PROXYHARBOR_KEY_PEPPER: pepper-with-at-least-thirty-two-bytes-runtime53
        run: go run ./tools/hacorrect -docker -timeout 6m
      - name: HA Go SDK correctness
        working-directory: tools/hasdkcheck
        env:
          PROXYHARBOR_ADMIN_KEY: admin-key-with-at-least-thirty-two-bytes-runtime53
          PROXYHARBOR_KEY_PEPPER: pepper-with-at-least-thirty-two-bytes-runtime53
        run: go run . -docker -samples 500 -disable-samples 100 -concurrency 16 -timeout 8m
