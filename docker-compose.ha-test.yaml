# ProxyHarbor HA correctness test topology.
# Starts MySQL + Redis + 3 ProxyHarbor instances behind nginx.

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: proxyharbor
      MYSQL_USER: proxyharbor
      MYSQL_PASSWORD: proxyharbor
    volumes:
      - ./migrations/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7.4-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  proxyharbor-a: &proxyharbor
    build:
      context: .
    image: proxyharbor:ha-test
    environment:
      PROXYHARBOR_ROLE: all
      PROXYHARBOR_ADDR: ":8080"
      PROXYHARBOR_GATEWAY_URL: http://localhost:${PROXYHARBOR_HA_TEST_PORT:-18081}
      PROXYHARBOR_ADMIN_KEY: ${PROXYHARBOR_ADMIN_KEY:?set PROXYHARBOR_ADMIN_KEY}
      PROXYHARBOR_KEY_PEPPER: ${PROXYHARBOR_KEY_PEPPER:?set PROXYHARBOR_KEY_PEPPER}
      PROXYHARBOR_STORAGE: mysql
      PROXYHARBOR_MYSQL_DSN: proxyharbor:proxyharbor@tcp(mysql:3306)/proxyharbor?parseTime=true&loc=UTC
      PROXYHARBOR_REDIS_ADDR: redis:6379
      PROXYHARBOR_SELECTOR: zfair
      PROXYHARBOR_SELECTOR_REDIS_REQUIRED: "true"
      PROXYHARBOR_CLUSTER_ENABLED: "true"
      PROXYHARBOR_ALLOW_INTERNAL_PROXY_ENDPOINT: "true"
      PROXYHARBOR_CACHE_TTL: 1s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  proxyharbor-b:
    <<: *proxyharbor
    environment:
      PROXYHARBOR_ROLE: all
      PROXYHARBOR_ADDR: ":8080"
      PROXYHARBOR_GATEWAY_URL: http://localhost:${PROXYHARBOR_HA_TEST_PORT:-18081}
      PROXYHARBOR_ADMIN_KEY: ${PROXYHARBOR_ADMIN_KEY:?set PROXYHARBOR_ADMIN_KEY}
      PROXYHARBOR_KEY_PEPPER: ${PROXYHARBOR_KEY_PEPPER:?set PROXYHARBOR_KEY_PEPPER}
      PROXYHARBOR_STORAGE: mysql
      PROXYHARBOR_MYSQL_DSN: proxyharbor:proxyharbor@tcp(mysql:3306)/proxyharbor?parseTime=true&loc=UTC
      PROXYHARBOR_REDIS_ADDR: redis:6379
      PROXYHARBOR_SELECTOR: zfair
      PROXYHARBOR_SELECTOR_REDIS_REQUIRED: "true"
      PROXYHARBOR_CLUSTER_ENABLED: "true"
      PROXYHARBOR_ALLOW_INTERNAL_PROXY_ENDPOINT: "true"
      PROXYHARBOR_CACHE_TTL: 1s

  proxyharbor-c:
    <<: *proxyharbor
    environment:
      PROXYHARBOR_ROLE: all
      PROXYHARBOR_ADDR: ":8080"
      PROXYHARBOR_GATEWAY_URL: http://localhost:${PROXYHARBOR_HA_TEST_PORT:-18081}
      PROXYHARBOR_ADMIN_KEY: ${PROXYHARBOR_ADMIN_KEY:?set PROXYHARBOR_ADMIN_KEY}
      PROXYHARBOR_KEY_PEPPER: ${PROXYHARBOR_KEY_PEPPER:?set PROXYHARBOR_KEY_PEPPER}
      PROXYHARBOR_STORAGE: mysql
      PROXYHARBOR_MYSQL_DSN: proxyharbor:proxyharbor@tcp(mysql:3306)/proxyharbor?parseTime=true&loc=UTC
      PROXYHARBOR_REDIS_ADDR: redis:6379
      PROXYHARBOR_SELECTOR: zfair
      PROXYHARBOR_SELECTOR_REDIS_REQUIRED: "true"
      PROXYHARBOR_CLUSTER_ENABLED: "true"
      PROXYHARBOR_ALLOW_INTERNAL_PROXY_ENDPOINT: "true"
      PROXYHARBOR_CACHE_TTL: 1s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${PROXYHARBOR_HA_TEST_BIND_ADDR:-127.0.0.1}:${PROXYHARBOR_HA_TEST_PORT:-18081}:8080"
    volumes:
      - ./testdata/ha/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - proxyharbor-a
      - proxyharbor-b
      - proxyharbor-c

